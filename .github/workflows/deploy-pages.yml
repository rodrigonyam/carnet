name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: "AIzaSyBxjAmE1ZjFw4EM2hv--oaYfd_lwbZ5v9g"
          VITE_FIREBASE_AUTH_DOMAIN: "carnets-cbb8b.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "carnets-cbb8b"
          VITE_FIREBASE_STORAGE_BUCKET: "carnets-cbb8b.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "1091141529740"
          VITE_FIREBASE_APP_ID: "1:1091141529740:web:cb8ff55ec31bcd3e288ba9"
          VITE_FIREBASE_MEASUREMENT_ID: "G-W2GK60WCJQ"

      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
